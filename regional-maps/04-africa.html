<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zijin — Africa Operations 非洲</title>
<link rel="stylesheet" href="_styles.css">
</head>
<body>
<section class="slide">
  <div class="crystal-grid"></div>
  <span class="ghost" style="left: -7%; bottom: -12%; font-size: 52vw; opacity: 0.016;">非</span>
  <div class="glow-line" style="top: 22%; width: 100%;"></div>
  <div class="glow-line" style="bottom: 22%; width: 100%;"></div>
  <div class="glow-line-v" style="left: 30%; height: 100%;"></div>
  <div class="glow-line-v" style="right: 30%; height: 100%;"></div>

  <div class="header">
    <div class="cn-label">第 四 部 分 · 非 洲</div>
    <h1>The <span class="accent">Copperbelt</span></h1>
    <div class="rule"></div>
    <div class="sub">DRC Transition-Minerals Anchor — Copper · Cobalt · Lithium</div>
  </div>

  <div class="map-wrap"><svg id="map"></svg></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:var(--ember);color:var(--ember);"></span>Copper</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--gold);color:var(--gold);"></span>Gold</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--lithium);color:var(--lithium);"></span>Lithium</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--zinc);color:var(--zinc);"></span>Zinc / Poly</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--other);color:var(--other);"></span>PGMs</div>
  </div>

  <div class="info-panel" id="panel">
    <span class="close" id="close">✕</span>
    <h3 id="p-type">Asset</h3>
    <h2 id="p-name">—</h2>
    <div class="country" id="p-cn">—</div>
    <div class="rule-ember"></div>
    <p id="p-desc">Select a marker.</p>
    <div class="meta">
      <div><div class="l">Stake</div><div class="v" id="p-stake">—</div></div>
      <div><div class="l">Country</div><div class="v" id="p-region">—</div></div>
      <div><div class="l">Commodity</div><div class="v" id="p-com">—</div></div>
      <div><div class="l">Status</div><div class="v" id="p-status">—</div></div>
    </div>
  </div>

  <div class="hex-badge">非洲</div>
  <div class="proverb">矿 山 之 脉 · 通 达 天 下</div>
  <span class="sn">REGION 04 / 05 · AFRICA</span>
</section>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>
const operations = [
  { name: "Kamoa-Kakula", cn: "卡莫阿-卡库拉", country: "Dem. Rep. Congo", region: "Lualaba, DRC", lat: -10.73, lon: 25.30, type: "copper", commodity: "Copper (±Cobalt)", stake: "44.45%", status: "Operational — Phase III ramp", desc: "Joint venture with Ivanhoe Mines and Gécamines (DRC state). World's fourth-largest and fastest-ramping copper complex; phased expansion makes Kamoa-Kakula the single largest copper asset in Zijin's global portfolio.", off: [-170,-22] },
  { name: "Kolwezi (COMMUS)", cn: "科卢韦齐", country: "Dem. Rep. Congo", region: "Lualaba, DRC", lat: -10.70, lon: 25.54, type: "copper", commodity: "Copper + Cobalt", stake: "72%", status: "Operational — 129 kt Cu / 2.2 kt Co (2023)", desc: "Compagnie Minière de Musonoie Global (COMMUS). Zijin-operated Kolwezi open-pit producing both copper and cobalt — direct exposure to the global battery-materials supply chain.", off: [14,14] },
  { name: "Manono NE Lithium", cn: "马诺诺锂矿", country: "Dem. Rep. Congo", region: "Tanganyika, DRC", lat: -7.30, lon: 27.40, type: "lithium", commodity: "Lithium (spodumene)", stake: "54.9%", status: "Development — title dispute with AVZ", desc: "Northeastern portion of the Manono pegmatite — one of the world's largest known hard-rock lithium resources. Title-contested with AVZ Minerals and Cominière; Zijin's stake positions it centrally in China's upstream lithium play.", off: [12,-8] },
  { name: "Akyem Gold Mine", cn: "阿基姆金矿", country: "Ghana", region: "Eastern Region, Ghana", lat: 6.35, lon: -1.10, type: "gold", commodity: "Gold", stake: "100%", status: "Acquired 2024 from Newmont (~US$1B)", desc: "Zijin's largest West African acquisition and its first OECD-quality gold operation in Africa. Consolidates its West-African posture under rising Ghanaian royalty pressure and OECD-miner divestment from the region.", off: [-160,-8] },
  { name: "Bisha Polymetallic", cn: "比沙", country: "Eritrea", region: "Gash-Barka, Eritrea", lat: 15.73, lon: 37.48, type: "zinc", commodity: "Cu + Zn + Au (VMS)", stake: "55%", status: "Operational", desc: "Inherited from the 2018 Nevsun Resources acquisition — the same deal brought Timok (Serbia). Sequential Cu / Zn / Au phases in a classic volcanogenic massive sulphide orebody.", off: [12,-8] },
  { name: "Garatau PGMs", cn: "加拉陶", country: "South Africa", region: "Fetakgomo Tubatse, Limpopo", lat: -24.68, lon: 30.05, type: "other", commodity: "PGMs (Pt / Pd / Rh)", stake: "74%", status: "Development", desc: "Platinum-group-metals project on South Africa's Eastern Bushveld Complex — Zijin's entry into PGMs and indirect exposure to hydrogen and auto-catalyst supply chains. Lithium exploration acreage adjacent.", off: [12,-8] }
];

const svg = d3.select("#map");
const w = window.innerWidth, h = window.innerHeight;
svg.attr("viewBox", `0 0 ${w} ${h}`);

const projection = d3.geoMercator()
  .center([22, 2])
  .scale(Math.min(w, h) * 1.18)
  .translate([w/2 + 80, h/2 + 10]);

const path = d3.geoPath(projection);
const focusCountries = new Set(["Dem. Rep. Congo","Ghana","Eritrea","South Africa","Nigeria","Kenya","Tanzania","Ethiopia","Sudan","South Sudan","Angola","Zambia","Zimbabwe","Mozambique","Namibia","Botswana","Madagascar","Chad","Niger","Mali","Algeria","Libya","Egypt","Morocco","Mauritania","Senegal","Cameroon","Uganda","Somalia","Central African Rep.","Burkina Faso","Guinea","Côte d'Ivoire","Benin","Togo","Liberia","Sierra Leone","Gabon","Eq. Guinea","Rep. Congo","Malawi","Lesotho","Swaziland","Burundi","Rwanda","Djibouti","W. Sahara","Tunisia"]);

svg.append("path").datum(d3.geoGraticule().step([10,10])).attr("class","graticule").attr("d", path);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world => {
  const countries = topojson.feature(world, world.objects.countries);
  svg.append("g").selectAll("path").data(countries.features).enter().append("path")
    .attr("class", d => focusCountries.has(d.properties.name) ? "land focus" : "land")
    .attr("d", path)
    .attr("data-name", d => d.properties.name);
  svg.append("path").datum(topojson.mesh(world, world.objects.countries, (a,b) => a !== b)).attr("class","border").attr("d", path);

  const g = svg.append("g");
  const nodes = g.selectAll("g.op").data(operations).enter().append("g")
    .attr("class", d => `op ${d.type}`)
    .attr("transform", d => `translate(${projection([d.lon, d.lat])})`)
    .on("mouseover", function(e,d) { svg.selectAll(".land").classed("hover", p => p.properties.name === d.country); })
    .on("mouseout", () => svg.selectAll(".land").classed("hover", false))
    .on("click", (e,d) => showPanel(d));
  nodes.append("circle").attr("class","pulse").attr("r",6);
  nodes.append("circle").attr("class","dot").attr("r",4.5);
  nodes.each(function(d) {
    const [ox, oy] = d.off || [10,-8];
    const textLen = d.name.length * 6.2 + 20;
    const g2 = d3.select(this);
    g2.append("rect").attr("class","label-bg").attr("x", ox).attr("y", oy-10).attr("width", textLen).attr("height", 22).attr("rx",1);
    g2.append("text").attr("class","label-txt").attr("x", ox+8).attr("y", oy+2).text(d.name);
    g2.append("text").attr("class","label-meta").attr("x", ox+8).attr("y", oy+10).text(d.region);
  });
});

function showPanel(d) {
  document.getElementById("panel").classList.add("show");
  document.getElementById("p-name").textContent = d.name;
  document.getElementById("p-cn").textContent = d.cn;
  document.getElementById("p-desc").textContent = d.desc;
  document.getElementById("p-stake").textContent = d.stake;
  document.getElementById("p-region").textContent = d.country;
  document.getElementById("p-com").textContent = d.commodity;
  document.getElementById("p-status").textContent = d.status;
  document.getElementById("p-type").textContent = d.type.toUpperCase() + " ASSET";
}
document.getElementById("close").onclick = () => document.getElementById("panel").classList.remove("show");
</script>
</body>
</html>
