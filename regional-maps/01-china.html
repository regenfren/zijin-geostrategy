<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zijin — China Operations 中国</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;700&family=Noto+Serif+SC:wght@200;400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --void: #0C0818; --void-mid: #140F24; --void-light: #1E1834;
    --ember: #E05830; --ember-dim: rgba(224, 88, 48, 0.12);
    --cyan: #3ABCC8; --cyan-dim: rgba(58, 188, 200, 0.1);
    --ice: #E8E4F0; --ice-dim: rgba(232, 228, 240, 0.4);
    --gold: #D4A657; --lithium: #6BD4C8; --zinc: #B98FD9;
    --grid-line: rgba(58, 188, 200, 0.04);
  }
  html { font-size: 16px; }
  body { background: var(--void); color: var(--ice); font-family: 'Space Grotesk', sans-serif; overflow: hidden; height: 100vh; }
  .slide { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
  .crystal-grid {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .ghost { font-family: 'Noto Serif SC', serif; font-weight: 900; color: var(--cyan); position: absolute; user-select: none; pointer-events: none; z-index: 1; line-height: 0.85; }
  .glow-line { position: absolute; z-index: 1; pointer-events: none; background: linear-gradient(90deg, transparent, var(--cyan), transparent); height: 1px; opacity: 0.06; }
  .glow-line-v { position: absolute; z-index: 1; pointer-events: none; background: linear-gradient(180deg, transparent, var(--ember), transparent); width: 1px; opacity: 0.06; }
  .header { position: absolute; top: 40px; left: 60px; z-index: 5; }
  .cn-label { font-family: 'Noto Serif SC', serif; font-weight: 200; font-size: 0.85rem; color: var(--ember); letter-spacing: 8px; margin-bottom: 12px; }
  .header h1 { font-weight: 700; font-size: 3.4rem; line-height: 0.95; letter-spacing: -2px; }
  .header h1 .accent { color: var(--ember); }
  .header .sub { font-size: 0.78rem; color: var(--ice-dim); font-weight: 300; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; }
  .rule { width: 48px; height: 2px; background: var(--ember); margin: 14px 0; }
  .sn { position: absolute; bottom: 24px; right: 40px; font-size: 0.58rem; letter-spacing: 3px; color: var(--cyan); opacity: 0.3; z-index: 10; }
  .proverb { position: absolute; z-index: 3; writing-mode: vertical-rl; font-family: 'Noto Serif SC', serif; font-weight: 200; letter-spacing: 10px; opacity: 0.15; right: 28px; top: 50%; transform: translateY(-50%); font-size: 0.85rem; color: var(--cyan); }

  .map-wrap { position: absolute; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; }
  .map-wrap svg { width: 100%; height: 100%; }

  /* country paths */
  .land { fill: var(--void-mid); stroke: rgba(58,188,200,0.18); stroke-width: 0.5; transition: fill 0.3s ease; }
  .land.focus { fill: var(--void-light); stroke: rgba(58,188,200,0.35); }
  .land.hover { fill: rgba(224, 88, 48, 0.14); stroke: var(--ember); stroke-width: 1; }
  .graticule { fill: none; stroke: rgba(58, 188, 200, 0.06); stroke-width: 0.5; }
  .border { fill: none; stroke: rgba(232, 228, 240, 0.12); stroke-width: 0.4; }
  .province-label { font-family: 'Space Grotesk', sans-serif; font-size: 9px; fill: var(--ice-dim); opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; pointer-events: none; }

  /* markers */
  .op { cursor: pointer; }
  .op .pulse { transform-origin: center; animation: pulse 2.6s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.55; r: 6; } 50% { opacity: 0; r: 18; } }
  .op .dot { filter: drop-shadow(0 0 6px currentColor); transition: r 0.2s ease; }
  .op:hover .dot { r: 7; }
  .op .label-bg { fill: rgba(12,8,24,0.8); stroke: rgba(58,188,200,0.2); stroke-width: 0.5; }
  .op .label-txt { font-family: 'Space Grotesk', sans-serif; font-size: 10px; fill: var(--ice); font-weight: 500; letter-spacing: 0.5px; pointer-events: none; }
  .op .label-meta { font-family: 'Space Grotesk', sans-serif; font-size: 8px; fill: var(--ice-dim); letter-spacing: 0.5px; pointer-events: none; }
  .op.copper .dot, .op.copper .pulse { color: var(--ember); fill: var(--ember); }
  .op.gold .dot, .op.gold .pulse { color: var(--gold); fill: var(--gold); }
  .op.lithium .dot, .op.lithium .pulse { color: var(--lithium); fill: var(--lithium); }
  .op.zinc .dot, .op.zinc .pulse { color: var(--zinc); fill: var(--zinc); }

  /* legend */
  .legend { position: absolute; bottom: 40px; left: 60px; z-index: 5; display: flex; gap: 22px; padding: 14px 20px; border: 1px solid var(--cyan-dim); background: rgba(12,8,24,0.6); backdrop-filter: blur(6px); }
  .legend::before { content: ''; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px; border-top: 2px solid var(--ember); border-left: 2px solid var(--ember); opacity: 0.5; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--ice-dim); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }

  /* info panel */
  .info-panel { position: absolute; top: 50%; right: 50px; transform: translateY(-50%); z-index: 6; width: 320px; padding: 22px 26px; border: 1px solid var(--cyan-dim); background: linear-gradient(135deg, rgba(58,188,200,0.04), transparent), rgba(12,8,24,0.85); backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  .info-panel.show { opacity: 1; pointer-events: auto; }
  .info-panel::before { content: ''; position: absolute; top: -1px; left: -1px; width: 14px; height: 14px; border-top: 2px solid var(--ember); border-left: 2px solid var(--ember); opacity: 0.5; }
  .info-panel h3 { font-size: 0.58rem; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; margin-bottom: 8px; }
  .info-panel h2 { font-size: 1.55rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .info-panel .country { font-family: 'Noto Serif SC', serif; font-weight: 200; color: var(--ember); letter-spacing: 4px; font-size: 0.8rem; margin-bottom: 16px; }
  .info-panel .rule-ember { width: 32px; height: 2px; background: var(--ember); margin-bottom: 14px; }
  .info-panel p { font-size: 0.82rem; font-weight: 300; color: var(--ice-dim); line-height: 1.7; margin-bottom: 14px; }
  .info-panel .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--cyan-dim); }
  .info-panel .meta .l { font-size: 0.52rem; letter-spacing: 2px; text-transform: uppercase; color: var(--cyan); opacity: 0.7; margin-bottom: 3px; }
  .info-panel .meta .v { font-size: 0.9rem; color: var(--ice); font-weight: 500; }
  .info-panel .close { position: absolute; top: 14px; right: 16px; color: var(--ice-dim); cursor: pointer; font-size: 1rem; opacity: 0.5; transition: opacity 0.2s; }
  .info-panel .close:hover { opacity: 1; color: var(--ember); }

  .hex-badge { position: absolute; bottom: 40px; right: 50px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-family: 'Noto Serif SC', serif; font-size: 1.1rem; color: var(--ember); z-index: 5; }
  .hex-badge::before { content: ''; position: absolute; inset: 0; border: 1.5px solid var(--ember); opacity: 0.5; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }
</style>
</head>
<body>
<section class="slide">
  <div class="crystal-grid"></div>
  <span class="ghost" style="right: -5%; bottom: -12%; font-size: 52vw; opacity: 0.018;">中</span>
  <div class="glow-line" style="top: 22%; width: 100%;"></div>
  <div class="glow-line" style="bottom: 22%; width: 100%;"></div>
  <div class="glow-line-v" style="left: 30%; height: 100%;"></div>
  <div class="glow-line-v" style="right: 30%; height: 100%;"></div>

  <div class="header">
    <div class="cn-label">第 一 部 分 · 中 国</div>
    <h1>Home <span class="accent">Fortress</span></h1>
    <div class="rule"></div>
    <div class="sub">Zijin's Domestic Core — 1986 → Present</div>
  </div>

  <div class="map-wrap"><svg id="map"></svg></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:var(--ember);color:var(--ember);"></span>Copper</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--gold);color:var(--gold);"></span>Gold</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--zinc);color:var(--zinc);"></span>Zinc / Poly</div>
  </div>

  <div class="info-panel" id="panel">
    <span class="close" id="close">✕</span>
    <h3 id="p-type">Asset</h3>
    <h2 id="p-name">—</h2>
    <div class="country" id="p-cn">中 国</div>
    <div class="rule-ember"></div>
    <p id="p-desc">Select a marker.</p>
    <div class="meta">
      <div><div class="l">Stake</div><div class="v" id="p-stake">—</div></div>
      <div><div class="l">Region</div><div class="v" id="p-region">—</div></div>
      <div><div class="l">Commodity</div><div class="v" id="p-com">—</div></div>
      <div><div class="l">Status</div><div class="v" id="p-status">—</div></div>
    </div>
  </div>

  <div class="hex-badge">中</div>
  <div class="proverb">根 深 叶 茂 · 本 固 枝 荣</div>
  <span class="sn">REGION 01 / 05 · CHINA</span>
</section>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>
const operations = [
  { name: "Zijinshan", cn: "紫金山", country: "China", region: "Fujian (HQ)", lat: 25.05, lon: 116.42, type: "gold", commodity: "Gold + Copper", stake: "100%", status: "Operational — flagship", desc: "Founding mine and corporate HQ. The Zijinshan polymetallic complex in Shanghang county launched Zijin's trajectory from a loss-making provincial gold mine in 1993 to the world's largest gold-copper major by 2025." },
  { name: "Julong Copper", cn: "巨龙铜矿", country: "China", region: "Tibet", lat: 29.72, lon: 91.83, type: "copper", commodity: "Copper", stake: "50.1%", status: "Phase II expansion", desc: "Highest-altitude operating copper mine in the world. Phase II expansion will triple throughput by 2026, making Julong the largest single copper mine in China." },
  { name: "Ashele", cn: "阿舍勒", country: "China", region: "Xinjiang", lat: 48.06, lon: 86.41, type: "copper", commodity: "Copper + Zinc", stake: "51%", status: "Operational", desc: "Polymetallic VMS deposit in the Altay mountains. Strategic Xinjiang footprint aligning with BRI transit corridors to Central Asia." },
  { name: "Wulatehouqi", cn: "乌拉特后旗", country: "China", region: "Inner Mongolia", lat: 41.5, lon: 108.5, type: "zinc", commodity: "Zinc + Lead", stake: "95%", status: "Operational", desc: "Large-scale zinc-lead deposit feeding Zijin's integrated smelter network across northern China." },
  { name: "Duobaoshan", cn: "多宝山", country: "China", region: "Heilongjiang", lat: 50.2, lon: 125.75, type: "copper", commodity: "Copper + Moly", stake: "100%", status: "Operational", desc: "Porphyry copper-molybdenum deposit on the Sino-Russian border. Long-lived, low-grade, high-volume asset feeding the northeastern smelter belt." },
  { name: "Shuiyindong", cn: "水银洞", country: "China", region: "Guizhou", lat: 25.4, lon: 105.6, type: "gold", commodity: "Carlin-type Gold", stake: "100%", status: "Operational", desc: "Southwest China's most significant Carlin-type gold orebody. Refractory ore processed via pressure oxidation — Zijin's technical specialty." },
  { name: "Luoning Gold", cn: "洛宁金矿", country: "China", region: "Henan", lat: 34.4, lon: 111.6, type: "gold", commodity: "Gold", stake: "100%", status: "Operational", desc: "Central China gold district. Consolidated under Zijin through acquisition of scattered private operators in the late 2000s." }
];

const svg = d3.select("#map");
const w = window.innerWidth, h = window.innerHeight;
svg.attr("viewBox", `0 0 ${w} ${h}`);

// Albers projection centered on China
const projection = d3.geoConicConformal()
  .parallels([25, 47])
  .rotate([-105, 0])
  .center([0, 35])
  .scale(Math.min(w, h) * 1.2)
  .translate([w/2, h/2 + 20]);

const path = d3.geoPath(projection);

svg.append("path").datum(d3.geoGraticule().step([10,10])).attr("class","graticule").attr("d", path);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world => {
  const countries = topojson.feature(world, world.objects.countries);
  svg.append("g").selectAll("path").data(countries.features).enter().append("path")
    .attr("class", d => d.properties.name === "China" ? "land focus" : "land")
    .attr("d", path)
    .attr("data-name", d => d.properties.name);

  svg.append("path").datum(topojson.mesh(world, world.objects.countries, (a,b) => a !== b)).attr("class","border").attr("d", path);

  const g = svg.append("g");
  const nodes = g.selectAll("g.op").data(operations).enter().append("g")
    .attr("class", d => `op ${d.type}`)
    .attr("transform", d => `translate(${projection([d.lon, d.lat])})`)
    .on("mouseover", function(e,d) {
      svg.selectAll(".land").classed("hover", p => p.properties.name === d.country && p.properties.name !== "China");
    })
    .on("mouseout", () => svg.selectAll(".land").classed("hover", false))
    .on("click", (e,d) => showPanel(d));

  nodes.append("circle").attr("class","pulse").attr("r",6);
  nodes.append("circle").attr("class","dot").attr("r",4.5);

  nodes.each(function(d, i) {
    const labelOffset = [8, -8];
    const g2 = d3.select(this);
    const textLen = d.name.length * 6.2 + 20;
    g2.append("rect").attr("class","label-bg")
      .attr("x", labelOffset[0]).attr("y", labelOffset[1] - 10)
      .attr("width", textLen).attr("height", 22).attr("rx",1);
    g2.append("text").attr("class","label-txt").attr("x", labelOffset[0]+8).attr("y", labelOffset[1]+2).text(d.name);
    g2.append("text").attr("class","label-meta").attr("x", labelOffset[0]+8).attr("y", labelOffset[1]+10).text(d.region);
  });
});

function showPanel(d) {
  document.getElementById("panel").classList.add("show");
  document.getElementById("p-name").textContent = d.name;
  document.getElementById("p-cn").textContent = d.cn;
  document.getElementById("p-desc").textContent = d.desc;
  document.getElementById("p-stake").textContent = d.stake;
  document.getElementById("p-region").textContent = d.region;
  document.getElementById("p-com").textContent = d.commodity;
  document.getElementById("p-status").textContent = d.status;
  document.getElementById("p-type").textContent = d.type.toUpperCase() + " ASSET";
}
document.getElementById("close").onclick = () => document.getElementById("panel").classList.remove("show");
</script>
</body>
</html>
