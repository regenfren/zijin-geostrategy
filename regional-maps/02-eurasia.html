<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zijin — Eurasia Operations 欧亚</title>
<link rel="stylesheet" href="_styles.css">
</head>
<body>
<section class="slide">
  <div class="crystal-grid"></div>
  <span class="ghost" style="left: -6%; top: -10%; font-size: 48vw; opacity: 0.015;">欧</span>
  <span class="ghost" style="right: -6%; bottom: -14%; font-size: 48vw; opacity: 0.015;">亚</span>
  <div class="glow-line" style="top: 22%; width: 100%;"></div>
  <div class="glow-line" style="bottom: 22%; width: 100%;"></div>
  <div class="glow-line-v" style="left: 30%; height: 100%;"></div>
  <div class="glow-line-v" style="right: 30%; height: 100%;"></div>

  <div class="header">
    <div class="cn-label">第 二 部 分 · 欧 亚</div>
    <h1>The <span class="accent">Silk Corridor</span></h1>
    <div class="rule"></div>
    <div class="sub">Central Asia, Mongolia & Russian Tuva — BRI / SCO Alignment</div>
  </div>

  <div class="map-wrap"><svg id="map"></svg></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:var(--ember);color:var(--ember);"></span>Copper</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--gold);color:var(--gold);"></span>Gold</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--zinc);color:var(--zinc);"></span>Zinc / Poly</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--lithium);color:var(--lithium);"></span>Lithium</div>
  </div>

  <div class="info-panel" id="panel">
    <span class="close" id="close">✕</span>
    <h3 id="p-type">Asset</h3>
    <h2 id="p-name">—</h2>
    <div class="country" id="p-cn">—</div>
    <div class="rule-ember"></div>
    <p id="p-desc">Select a marker.</p>
    <div class="meta">
      <div><div class="l">Stake</div><div class="v" id="p-stake">—</div></div>
      <div><div class="l">Country</div><div class="v" id="p-region">—</div></div>
      <div><div class="l">Commodity</div><div class="v" id="p-com">—</div></div>
      <div><div class="l">Status</div><div class="v" id="p-status">—</div></div>
    </div>
  </div>

  <div class="hex-badge">欧亚</div>
  <div class="proverb">一 带 一 路 · 丝 绸 之 路</div>
  <span class="sn">REGION 02 / 05 · EURASIA</span>
</section>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script>
const operations = [
  { name: "Taldybulak Levoberezhny", cn: "塔尔德布拉克", country: "Kyrgyzstan", region: "Kyrgyzstan", lat: 42.73, lon: 74.62, type: "gold", commodity: "Gold", stake: "60%", status: "Operational — community tensions", desc: "Zijin's first major Central Asian foothold. Operated as a JV with Kyrgyzaltyn; episodic protests and contract-review pressure reflect the region's rising resource-nationalism environment.", off: [10,-8] },
  { name: "Zeravshan", cn: "泽拉夫尚", country: "Tajikistan", region: "Tajikistan", lat: 39.48, lon: 68.78, type: "gold", commodity: "Gold", stake: "75%", status: "Operational", desc: "JV with the Tajik state. A keystone of Zijin's Central Asian gold corridor; SCO-aligned and CDB-financed expansion of Jilau and Taror deposits.", off: [10,8] },
  { name: "Kyzyl-Tashtyg", cn: "克孜勒-塔什特格", country: "Russia", region: "Tuva, Russia", lat: 50.87, lon: 95.25, type: "zinc", commodity: "Zinc-rich Polymetallic", stake: "70%", status: "Operational — lithium pivot 2025", desc: "Underground VMS polymetallic mine in Russia's Tuva republic. Recently repositioned alongside Zijin's 2025 lithium scale-up in the Siberian brine-pegmatite belt.", off: [10,-8] },
  { name: "Raygorodok Bid", cn: "雷戈罗多克", country: "Kazakhstan", region: "Kazakhstan", lat: 50.40, lon: 72.20, type: "gold", commodity: "Gold", stake: "Bid / Exploration", status: "Under negotiation", desc: "Entry attempt into Kazakhstan's gold sector — tests Zijin's ability to compete with domestic oligarchic holdings under Astana's post-2022 FDI rebalancing.", off: [10,8] },
  { name: "Mongolia Exploration", cn: "蒙古勘探", country: "Mongolia", region: "Mongolia", lat: 47.0, lon: 106.9, type: "copper", commodity: "Copper prospects", stake: "Exploration", status: "Early stage", desc: "Exploration acreage adjacent to the Oyu Tolgoi porphyry belt. Strategic hedge via SCO pathway; constrained by Rio Tinto's incumbent position.", off: [10,-8] }
];

const svg = d3.select("#map");
const w = window.innerWidth, h = window.innerHeight;
svg.attr("viewBox", `0 0 ${w} ${h}`);

const projection = d3.geoConicConformal()
  .parallels([35, 55])
  .rotate([-80, 0])
  .center([0, 47])
  .scale(Math.min(w, h) * 1.15)
  .translate([w/2, h/2 + 20]);

const path = d3.geoPath(projection);
const focusCountries = new Set(["Kyrgyzstan","Tajikistan","Kazakhstan","Uzbekistan","Turkmenistan","Mongolia","Russia","Afghanistan","China","Iran","Azerbaijan","Armenia","Georgia"]);

svg.append("path").datum(d3.geoGraticule().step([10,10])).attr("class","graticule").attr("d", path);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world => {
  const countries = topojson.feature(world, world.objects.countries);
  svg.append("g").selectAll("path").data(countries.features).enter().append("path")
    .attr("class", d => focusCountries.has(d.properties.name) ? "land focus" : "land")
    .attr("d", path)
    .attr("data-name", d => d.properties.name);
  svg.append("path").datum(topojson.mesh(world, world.objects.countries, (a,b) => a !== b)).attr("class","border").attr("d", path);

  const g = svg.append("g");
  const nodes = g.selectAll("g.op").data(operations).enter().append("g")
    .attr("class", d => `op ${d.type}`)
    .attr("transform", d => `translate(${projection([d.lon, d.lat])})`)
    .on("mouseover", function(e,d) {
      svg.selectAll(".land").classed("hover", p => p.properties.name === d.country);
    })
    .on("mouseout", () => svg.selectAll(".land").classed("hover", false))
    .on("click", (e,d) => showPanel(d));
  nodes.append("circle").attr("class","pulse").attr("r",6);
  nodes.append("circle").attr("class","dot").attr("r",4.5);
  nodes.each(function(d) {
    const [ox, oy] = d.off || [10,-8];
    const textLen = d.name.length * 6.2 + 20;
    const g2 = d3.select(this);
    g2.append("rect").attr("class","label-bg").attr("x", ox).attr("y", oy-10).attr("width", textLen).attr("height", 22).attr("rx",1);
    g2.append("text").attr("class","label-txt").attr("x", ox+8).attr("y", oy+2).text(d.name);
    g2.append("text").attr("class","label-meta").attr("x", ox+8).attr("y", oy+10).text(d.region);
  });
});

function showPanel(d) {
  document.getElementById("panel").classList.add("show");
  document.getElementById("p-name").textContent = d.name;
  document.getElementById("p-cn").textContent = d.cn;
  document.getElementById("p-desc").textContent = d.desc;
  document.getElementById("p-stake").textContent = d.stake;
  document.getElementById("p-region").textContent = d.country;
  document.getElementById("p-com").textContent = d.commodity;
  document.getElementById("p-status").textContent = d.status;
  document.getElementById("p-type").textContent = d.type.toUpperCase() + " ASSET";
}
document.getElementById("close").onclick = () => document.getElementById("panel").classList.remove("show");
</script>
</body>
</html>
